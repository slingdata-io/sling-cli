# Test that timestamp variables in source stream wildcards are expanded before file discovery
# Reproduces: https://github.com/slingdata-io/sling-cli/issues/376
# Users want to filter source files by date using patterns like *_{YYYY}-{MM}-{DD}.txt

steps:
  # 1. Create temp directory with date-stamped files
  - command: |
      mkdir -p temp/ts_wildcard_test
      echo -e "id,name,value\n1,alice,100\n2,bob,200" > "temp/ts_wildcard_test/data_$(date +%Y-%m-%d).csv"
      echo -e "id,name,value\n3,charlie,300" > "temp/ts_wildcard_test/data_1999-01-01.csv"
    on_failure: abort

  # 2. Setup target table
  - connection: postgres
    query: DROP TABLE IF EXISTS public.ts_wildcard_test;
    on_failure: abort

  # 3. Run replication with timestamp variables in the stream wildcard pattern
  - replication:
      source: local
      target: postgres
      defaults:
        mode: full-refresh
        object: public.ts_wildcard_test
      streams:
        "temp/ts_wildcard_test/data_{timestamp.YYYY}-{timestamp.MM}-{timestamp.DD}.csv":
    on_failure: abort

  # 4. Verify only today's file was loaded (2 rows), not the 1999 file
  - connection: postgres
    query: SELECT id, name, value FROM public.ts_wildcard_test ORDER BY id
    into: result

  - log: |
      result:
      {pretty_table(store.result)}

  - check: length(store.result) == 2
    failure_message: "Expected 2 rows from today's file, got {length(store.result)}"

  - check: store.result[0].name == "alice"
    failure_message: "Expected first row to be alice, got {store.result[0].name}"

  - check: store.result[1].name == "bob"
    failure_message: "Expected second row to be bob, got {store.result[1].name}"

  - log: "SUCCESS: timestamp variables in stream wildcard pattern work correctly (issue #376)"

  # 5. Cleanup
  - connection: postgres
    query: DROP TABLE IF EXISTS public.ts_wildcard_test;

  - command: rm -rf temp/ts_wildcard_test
