# CDC merge_cdc Template Test: PostgreSQL target
# Tests: INSERT, UPDATE, DELETE ops via merge_cdc strategy with staging table approach
# Validates: correct ordering by _sling_cdc_seq, multiple updates on same PK, delete removal

env:
  TARGET: postgres

steps:
  # Clean up
  - connection: '{env.TARGET}'
    query: |
      DROP TABLE IF EXISTS public.cdc_merge_test;

  # Create target table with initial data (simulates post-snapshot state)
  - connection: '{env.TARGET}'
    query: |
      CREATE TABLE public.cdc_merge_test (
        id INT PRIMARY KEY,
        name TEXT,
        amount INT,
        _sling_synced_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
      INSERT INTO public.cdc_merge_test (id, name, amount) VALUES
        (1, 'Alice', 100),
        (2, 'Bob', 200),
        (3, 'Charlie', 300);

  # Run replication with CDC-like source data and merge_cdc strategy
  - replication:
      source: '{env.TARGET}'
      target: '{env.TARGET}'

      defaults:
        mode: incremental
        primary_key: id

      streams:
        cdc_staging:
          sql: |
            SELECT 1 as id, 'Alice Updated' as name, 150 as amount, 'U' as _sling_synced_op, 1::bigint as _sling_cdc_seq, CURRENT_TIMESTAMP as _sling_synced_at
            UNION ALL SELECT 2, 'Bob', 200, 'D', 2, CURRENT_TIMESTAMP
            UNION ALL SELECT 4, 'Diana', 400, 'I', 3, CURRENT_TIMESTAMP
            UNION ALL SELECT 1, 'Alice Final', 175, 'U', 4, CURRENT_TIMESTAMP
          object: public.cdc_merge_test
          target_options:
            merge_strategy: change_capture

  # Verify results
  - type: query
    connection: '{env.TARGET}'
    query: SELECT count(*) as cnt FROM public.cdc_merge_test
    into: row_count

  - type: log
    message: "CDC merge row count: {store.row_count[0].cnt}"

  - type: check
    check: int_parse(store.row_count[0].cnt) == 3
    message: "Expected 3 rows (1 updated, 1 deleted, 1 inserted, 1 unchanged), got {store.row_count[0].cnt}"

  # Verify id=1 was updated to final value (Alice Final, 175)
  - type: query
    connection: '{env.TARGET}'
    query: SELECT name, amount FROM public.cdc_merge_test WHERE id = 1
    into: row_1

  - type: log
    message: "Row id=1: name={store.row_1[0].name}, amount={store.row_1[0].amount}"

  - type: check
    check: store.row_1[0].name == "Alice Final"
    message: "id=1 should have name='Alice Final' (latest update by _sling_cdc_seq), got '{store.row_1[0].name}'"

  - type: check
    check: int_parse(store.row_1[0].amount) == 175
    message: "id=1 should have amount=175, got {store.row_1[0].amount}"

  # Verify id=2 was deleted
  - type: query
    connection: '{env.TARGET}'
    query: SELECT count(*) as cnt FROM public.cdc_merge_test WHERE id = 2
    into: row_2

  - type: check
    check: int_parse(store.row_2[0].cnt) == 0
    message: "id=2 should be deleted, but found {store.row_2[0].cnt} rows"

  # Verify id=3 is unchanged
  - type: query
    connection: '{env.TARGET}'
    query: SELECT name, amount FROM public.cdc_merge_test WHERE id = 3
    into: row_3

  - type: check
    check: store.row_3[0].name == "Charlie"
    message: "id=3 should be unchanged with name='Charlie', got '{store.row_3[0].name}'"

  # Verify id=4 was inserted
  - type: query
    connection: '{env.TARGET}'
    query: SELECT name, amount FROM public.cdc_merge_test WHERE id = 4
    into: row_4

  - type: check
    check: store.row_4[0].name == "Diana"
    message: "id=4 should be inserted with name='Diana', got '{store.row_4[0].name}'"

  - type: log
    message: "CDC merge_cdc PostgreSQL test PASSED"

  # Clean up
  - connection: '{env.TARGET}'
    query: DROP TABLE IF EXISTS public.cdc_merge_test;
